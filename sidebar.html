<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style_admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Keep your original button design */
    .btn {
      background: linear-gradient(45deg, #9192ee, #8ce7af);
      color: black;
      font-weight: bold;
      cursor: pointer;
      
    }

    .btn:hover {
      transform: translateY(-3px);
      color: black;
      box-shadow: 0 6px 20px rgba(127, 207, 214, 0.6);
    }

    /* === Topbar === */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d1b2a;
      padding: 0.7rem 1rem;
      /* border-bottom: 1px solid #ddd; */
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1030;
    }

    .topbar .hamburger {
      font-size: 1.5rem;
      cursor: pointer;
      display: none; /* hidden on large screen */
    }

    .topbar .right-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .topbar .search-box input {
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
    }

    /* === Sidebar === */
    .sidebar {
      position: fixed;
      top: 60px; /* push below topbar */
      left: 0;
      width: 220px;
      height: calc(100% - 60px);
      overflow-y: auto;
      background: #0d1b2a; /* keep your design */
      z-index: 1020;
    }

    /* === Main Content === */
    .content {
      margin-left: 220px; /* push right of sidebar */
      padding: 20px;
      padding-top: 80px; /* avoid overlap with topbar */
    }

    /* === Sidebar toggle for small screens === */
    @media (max-width: 992px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }

      .sidebar.active {
        transform: translateX(0);
      }

      .content {
        margin-left: 0;
      }

      .topbar .hamburger {
        display: block;
      }
    }
  </style>
</head>

<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="hamburger" id="hamburger">
      <i class="fas fa-bars"></i>
    </div>
    <a href="{{ url_for('login') }}">
      <button type="button" class="btn btn-sm">Logout</button>
    </a>
   
    <div class="right-section">
      <div class="text-center" style="display: flex;gap: 10px;align-items: center;justify-content: center;">
        <p class="text-white mb-1">Logged in as: {{ admin_name }}</p>
        <img src="/static/img/admin_logo.png" alt="profile" style="width:80px;height:50px;border-radius:50%;">

      
      </div>
      <!-- <span>{{ admin_name }}</span> -->
     
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar text-white">
    <div style="display: flex;justify-content: center;">
      <img src="/static/img/logo2.png" alt="" style="width: 100px;filter: invert(100%);margin-top: 5px;">
    </div>

    <nav aria-label="Main Navigation">
      <ul class="nav flex-column mt-4">
        <li class="nav-item">
          <a href="{{ url_for('index.index') }}" class="nav-link text-white {% if request.path=='/admin/index' %}active{% endif %}">
            <i class="fas fa-home me-2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a href="{{ url_for('admin_issue.admin_issue') }}" class="nav-link text-white {% if '/admin/issue' in request.path %}active{% endif %}">
            <i class="fas fa-tasks me-2"></i> Issues
          </a>
        </li>
        <li class="nav-item">
          <a href="{{ url_for('admin_user') }}" class="nav-link text-white {% if '/admin/user' in request.path %}active{% endif %}">
            <i class="fas fa-users me-2"></i> Users
          </a>
        </li>
        <li class="nav-item">
          <a href="{{ url_for('admin_complaints.admin_complaints') }}" class="nav-link text-white">
            <i class="fa-solid fa-clipboard-list me-2"></i> Complaints Overview
          </a>
        </li>
      </ul>
    </nav>

  
  </aside>

  <!-- Main Content Block -->
  <main class="content">
    {% block content %}
    <!-- Page-specific content goes here -->
    {% endblock %}
  </main>

  <script>
    // Sidebar toggle with hamburger
    const hamburger = document.getElementById("hamburger");
    const sidebar = document.querySelector(".sidebar");

    hamburger.addEventListener("click", function () {
      sidebar.classList.toggle("active");

      // toggle icon
      if (sidebar.classList.contains("active")) {
        hamburger.innerHTML = '<i class="fas fa-times"></i>';
      } else {
        hamburger.innerHTML = '<i class="fas fa-bars"></i>';
      }
    });
  </script>

</body>

</html>

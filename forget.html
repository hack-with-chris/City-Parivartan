{% extends 'user/base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

<style>
  body,
  html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Arial, sans-serif;
  }

  .forgot-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    background: linear-gradient(270deg, #a3ccb4, #c8bfdf, #a1c4fd, #bee4ee);
    background-size: 800% 800%;
    animation: bgMove 30s ease infinite;
    position: relative;
  }

  @keyframes bgMove {
    0% { background-position: 0% 50% }
    50% { background-position: 100% 50% }
    100% { background-position: 0% 50% }
  }

  .circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.2;
    animation: float 12s ease-in-out infinite;
  }

  .circle:nth-child(1) { width: 120px; height: 120px; top: 10%; left: 15%; background: #fff59d; animation-delay: 0s; }
  .circle:nth-child(2) { width: 80px; height: 80px; top: 50%; right: 10%; background: #81d4fa; animation-delay: 2s; }
  .circle:nth-child(3) { width: 150px; height: 150px; bottom: 15%; left: 20%; background: #f48fb1; animation-delay: 1s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  .forgot-card {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    padding: 35px 25px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
  }

  .forgot-card h2 { margin-bottom: 20px; color: #0f3b75; }

  .input-group { position: relative; margin: 15px 0; }

  .input-group input {
    width: 100%;
    padding: 12px 40px 12px 12px;
    border-radius: 12px;
    border: 1px solid rgba(0, 0, 0, 0.2);
    outline: none;
    font-size: 14px;
    transition: all 0.3s;
  }

  .input-group input:focus {
    border-color: #0f3b75;
    box-shadow: 0 0 8px rgba(15, 59, 117, 0.4);
  }

  .input-group .input-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    color: #0f3b75;
    pointer-events: none;
  }

  .input-error { color: red; font-size: 13px; text-align: left; margin-top: 3px; }

  .forgot-card button {
    width: 90%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #42a5f5, #66bb6a);
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: 0.3s;
  }

  .forgot-card button:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(0, 123, 255, 0.5); }
</style>

<div class="forgot-wrapper">
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="forgot-card">
    <h2 data-key="forgot_password_title">Forgot Password</h2>
    <form id="forgotForm">
      <!-- Step 1: Enter Email -->
      <div id="step1">
        <div class="input-group">
          <input type="email" id="email" placeholder="" data-key-placeholder="enter_email" required>
          <i class="fas fa-envelope input-icon"></i>
          <div id="email_error" class="input-error"></div>
        </div>
        <button type="button" onclick="sendOTP()" data-key="send_otp_btn">Send OTP</button>
      </div>

      <!-- Step 2: Enter OTP -->
      <div id="step2" style="display:none;">
        <div class="input-group">
          <input type="text" id="otp" placeholder="" data-key-placeholder="enter_otp" required>
          <i class="fas fa-key input-icon"></i>
          <div id="otp_error" class="input-error"></div>
        </div>
        <button type="button" onclick="verifyOTP()" data-key="verify_otp_btn">Verify OTP</button>
      </div>

      <!-- Step 3: Reset Password -->
      <!-- Step 3: Reset Password -->
<div id="step3" style="display:none;">
  <!-- New Password -->
  <div class="input-group">
    <input type="password" id="new_password" placeholder="" data-key-placeholder="new_password" required
      style="padding-right:40px;">
    <i class="fa fa-eye"
       onclick="let pw=document.getElementById('new_password'); let t=this; pw.type=(pw.type==='password')?'text':'password'; t.className=(pw.type==='password')?'fa fa-eye':'fa fa-eye-slash';"
       style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:18px; color:#0f3b75;"></i>
  </div>
  <div id="new_pass_error" class="input-error"></div>

  <!-- Confirm Password -->
  <div class="input-group">
    <input type="password" id="confirm_password" placeholder="" data-key-placeholder="confirm_password" required
      style="padding-right:40px;">
    <i class="fa fa-eye"
       onclick="let pw=document.getElementById('confirm_password'); let t1=this; pw.type=(pw.type==='password')?'text':'password'; t1.className=(pw.type==='password')?'fa fa-eye':'fa fa-eye-slash';"
       style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:18px; color:#0f3b75;"></i>
    <div id="confirm_pass_error" class="input-error"></div>
  </div>

  <button type="button" onclick="resetPassword()" data-key="reset_password_btn">Reset Password</button>
</div>
<br>
      <a href="/login" data-key="login_link" style="color: rgb(17, 17, 230);text-decoration: none;">Login</a>
    </form>
  </div>
</div>

<script>
  let currentEmail = "";

  function sendOTP() {
    const email = document.getElementById("email").value.trim();
    document.getElementById("email_error").innerText = "";
    if (!email) { document.getElementById("email_error").innerText = t("email_required"); return; }

    fetch("/forget_send_otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    }).then(res => res.json()).then(data => {
      if (data.status == "ok") {
        currentEmail = email;
        alert(t("otp_sent"));
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
      } else {
        document.getElementById("email_error").innerText = data.message;
      }
    });
  }

  function verifyOTP() {
    const otp = document.getElementById("otp").value.trim();
    document.getElementById("otp_error").innerText = "";
    if (!otp) { document.getElementById("otp_error").innerText = t("otp_required"); return; }

    fetch("/forget_verify_otp", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: currentEmail, otp })
    }).then(res => res.json()).then(data => {
      if (data.status == "ok") {
        alert(t("otp_verified"));
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "block";
      } else {
        document.getElementById("otp_error").innerText = data.message;
      }
    });
  }

  function resetPassword() {
    const new_pass = document.getElementById("new_password").value.trim();
    const confirm_pass = document.getElementById("confirm_password").value.trim();
    document.getElementById("new_pass_error").innerText = "";
    document.getElementById("confirm_pass_error").innerText = "";

    if (!new_pass) { document.getElementById("new_pass_error").innerText = t("password_required"); return; }

    const regex = /^(?=.[a-z])(?=.[A-Z])(?=.\d)(?=.[@$!%*?&]).{6,}$/;
    if (!regex.test(new_pass)) {
      document.getElementById("new_pass_error").innerText = t("password_invalid");
      return;
    }

    if (new_pass !== confirm_pass) { document.getElementById("confirm_pass_error").innerText = t("password_mismatch"); return; }

    fetch("/forget_reset_password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: currentEmail, new_password: new_pass })
    }).then(res => res.json()).then(data => {
      if (data.status == "ok") {
        alert(t("password_reset_success"));
        window.location = "/auth/login";
      } else {
        alert(data.message);
      }
    });
  }
</script>
{% endblock %}

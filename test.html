<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Translation</title>
</head>
<body>
  <h1>Hello, Welcome to My Website!</h1>
  <p>This is a demo paragraph for translation.</p>

  <!-- Google Translate Dropdown -->
  <div id="google_translate_element" style="position:fixed;top:10px;right:10px;z-index:999;"></div>

  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {pageLanguage: 'en'}, // Default site language
        'google_translate_element'
      );

      // Apply saved language if exists
      let savedLang = localStorage.getItem("siteLanguage");
      if (savedLang) {
        setTimeout(() => {
          changeLanguage(savedLang);
        }, 1000);
      }
    }

    function changeLanguage(lang) {
      let selectField = document.querySelector("select.goog-te-combo");
      if (selectField) {
        selectField.value = lang;
        selectField.dispatchEvent(new Event("change"));
        localStorage.setItem("siteLanguage", lang);
      }
    }

    // Save user selection
    document.addEventListener("change", function(e) {
      if (e.target.classList.contains("goog-te-combo")) {
        changeLanguage(e.target.value);
      }
    });
  </script>

  <!-- Load Google Translate -->
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
